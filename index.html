
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디깅마켓 — 화면 구성</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f7f6f3;
    --border: rgba(55,53,47,0.09); --border2: rgba(55,53,47,0.16);
    --text: #37352f; --text2: #6b6860; --text3: #9b9a97;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919; --bg2: #252525;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e6e5e0; --text2: #9b9a96; --text3: #6b6a66;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }

  .page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .header { margin-bottom: 2rem; }
  .header-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: .35rem; }
  .header-title { font-size: 22px; font-weight: 700; }

  /* 상단 3열, 하단 2열 가운데 정렬 */
  .grid-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .grid-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-bottom-inner { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .screen-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg);
    cursor: pointer;
    transition: box-shadow .15s, transform .15s;
  }
  .screen-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }

  .screen-thumb {
    width: 100%;
    aspect-ratio: 9 / 14;
    overflow: hidden;
    background: var(--bg2);
  }
  .screen-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top;
    display: block;
  }

  .screen-info {
    padding: .65rem .85rem .75rem;
    border-top: 1px solid var(--border);
  }
  .screen-num { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: .2rem; }
  .screen-name { font-size: 13px; font-weight: 600; margin-bottom: .15rem; }
  .screen-desc { font-size: 11px; color: var(--text2); line-height: 1.5; }

  /* 라이트박스 */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .lightbox.open { display: flex; }
  .lightbox-inner {
    position: relative; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    border-radius: var(--radius-lg); background: var(--bg);
  }
  .lightbox-img { width: 100%; display: block; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  .lightbox-caption { padding: .85rem 1rem 1rem; border-top: 1px solid var(--border); }
  .lightbox-caption-title { font-size: 14px; font-weight: 600; margin-bottom: .2rem; }
  .lightbox-caption-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }
  .lightbox-close {
    position: absolute; top: .6rem; right: .6rem;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.45); color: #fff;
    border: none; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-close:hover { background: rgba(0,0,0,0.65); }

  /* 좌우 화살표 */
  .lb-prev, .lb-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: #fff;
    border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .lb-prev { left: calc(50% - 280px); }
  .lb-next { right: calc(50% - 280px); }
  .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.3); }

  @media (max-width: 600px) {
    .grid-top { grid-template-columns: 1fr 1fr; }
    .grid-bottom-inner { grid-template-columns: 1fr 1fr; }
    .lb-prev { left: .5rem; }
    .lb-next { right: .5rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-label">디깅마켓 · 화면 구성</div>
    <div class="header-title">주요 화면 5가지</div>
  </div>

  <div class="grid-top">
    <div class="screen-card" onclick="openLb(0)">
      <div class="screen-thumb"><img src="메인화면.png" alt="메인 홈"></div>
      <div class="screen-info">
        <div class="screen-num">01</div>
        <div class="screen-name">메인 홈</div>
        <div class="screen-desc">포맷별 카테고리 + 최신 등록 상품 목록</div>
      </div>
    </div>
    <div class="screen-card" onclick="openLb(1)">
      <div class="screen-thumb"><img src="내상점.png" alt="내 상점"></div>
      <div class="screen-info">
        <div class="screen-num">02</div>
        <div class="screen-name">내 상점</div>
        <div class="screen-desc">내 프로필 · 상품 목록 · 팀 · 팔로잉 · 팔로워 탭</div>
      </div>
    </div>
    <div class="screen-card" onclick="openLb(2)">
      <div class="screen-thumb"><img src="상품등록.png" alt="상품 등록"></div>
      <div class="screen-info">
        <div class="screen-num">03</div>
        <div class="screen-name">상품 등록</div>
        <div class="screen-desc">이미지 · 카테고리 · 상태 · 가격 · 배송 설정</div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
    <div class="screen-card" onclick="openLb(3)">
      <div class="screen-thumb"><img src="상점톡.png" alt="거래톡"></div>
      <div class="screen-info">
        <div class="screen-num">04</div>
        <div class="screen-name">거래톡</div>
        <div class="screen-desc">1:1 실시간 채팅 · 사진 전송 · 상품 정보 확인</div>
      </div>
    </div>
    <div class="screen-card" onclick="openLb(4)">
      <div class="screen-thumb"><img src="상점후기.png" alt="상점 후기"></div>
      <div class="screen-info">
        <div class="screen-num">05</div>
        <div class="screen-name">상점 후기</div>
        <div class="screen-desc">거래 완료 후 별점 · 후기 · 만족도 통계</div>
      </div>
    </div>
    <div></div>
  </div>

</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lb" onclick="handleLbClick(event)">
  <button class="lb-prev" onclick="navigate(-1)">‹</button>
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLb()">✕</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lightbox-caption">
      <div class="lightbox-caption-title" id="lb-title"></div>
      <div class="lightbox-caption-desc" id="lb-desc"></div>
    </div>
  </div>
  <button class="lb-next" onclick="navigate(1)">›</button>
</div>

<script>
  const screens = [
    { src: '메인화면.png',     title: '메인 홈',   desc: '포맷별 카테고리(CD·Vinyl·Cassette·DVD) 선택 후 오늘 들어온 신규 상품을 탐색하는 메인 페이지' },
    { src: '내상점.png',   title: '내 상점',   desc: '내 프로필·평점·판매 횟수 확인, 등록 상품 목록·상점 후기·팀·팔로잉·팔로워 탭 전환. 내 상점 관리 진입점.' },
    { src: '상품등록.png', title: '상품 등록', desc: '이미지(최대 5장), 카테고리(포맷·장르), 상품 상태, 가격 제안 옵션, 배송비 및 직거래 설정' },
    { src: '상점톡.png',     title: '거래톡',    desc: '닉네임 기반 1:1 실시간 채팅. 개인 연락처 없이 사진 전송·가격 협의 가능. 상단에 거래 상품 정보 고정.' },
    { src: '상점후기.png',   title: '상점 후기', desc: '거래 완료 후 별점·텍스트 후기 작성. 평균 평점·만족 후기 비율 통계 제공. 페이지네이션 포함.' },
  ];

  let cur = 0;

  function openLb(i) {
    cur = i;
    render();
    document.getElementById('lb').classList.add('open');
  }

  function render() {
    const s = screens[cur];
    document.getElementById('lb-img').src = s.src;
    document.getElementById('lb-title').textContent = s.title;
    document.getElementById('lb-desc').textContent = s.desc;
  }

  function navigate(dir) {
    cur = (cur + dir + screens.length) % screens.length;
    render();
  }

  function closeLb() {
    document.getElementById('lb').classList.remove('open');
  }

  function handleLbClick(e) {
    if (e.target === document.getElementById('lb')) closeLb();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });
</script>
</body>
</html>
